{% extends "base.html" %}
{% block content %}
<div class="card card-danger">
    <div class="card-header"><h3 class="card-title">Kuralı Sil</h3></div>
    <div class="card-body">
        <p><b>{{ rule.name }}</b> kuralını silmek istediğinizden emin misiniz?</p>
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="card-footer">
            <button type="submit" class="btn btn-danger">Evet, Sil</button>
            <a href="{% url 'cb_detail' rule.pk %}" class="btn btn-default">Hayır, İptal</a>
        </div>
    </form>
</div>
{% endblock %}
