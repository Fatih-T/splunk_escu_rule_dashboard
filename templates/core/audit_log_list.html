{% extends "base.html" %}
{% block content %}
<div class="card"><div class="card-header"><h3>Denetim Kayıtları</h3></div><div class="card-body p-0">
<table class="table table-sm"><thead><tr><th>Tarih</th><th>Aktör</th><th>Aksiyon</th><th>Nesne</th></tr></thead><tbody>
{% for l in logs %}<tr><td>{{ l.created_at|date:"Y-m-d H:i" }}</td><td>{{ l.actor_name }}</td><td>{{ l.action }}</td><td>{{ l.entity_label }}</td></tr>{% endfor %}
</tbody></table></div></div>
{% endblock %}
