{% extends "base.html" %}
{% block content %}
<div class="card"><div class="card-header"><h3>Sistem Yapılandırması</h3></div><div class="card-body p-0">
<table class="table table-striped"><thead><tr><th>Anahtar</th><th>Değer</th><th>İşlem</th></tr></thead><tbody>
{% for c in configs %}<tr><td>{{ c.key }}</td><td><code>{{ c.value }}</code></td><td><a href="{% url 'config_edit' c.pk %}" class="btn btn-xs btn-primary">Düzenle</a></td></tr>{% endfor %}
</tbody></table></div></div>
{% endblock %}
